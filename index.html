<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Laporan Kantor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding-top: 50px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-primary { background: #007bff; border: none; width: 100%; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h4 class="text-center mb-4">Upload Laporan Bulanan (PDF)</h4>
    <form id="formLaporan">
        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" name="nama" class="form-control" placeholder="Masukkan nama Anda" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Bulan Laporan</label>
            <select name="bulan" class="form-select">
                <option>Januari</option><option>Februari</option><option>Maret</option>
                <option>April</option><option>Mei</option><option>Juni</option>
                <option>Juli</option><option>Agustus</option><option>September</option>
                <option>Oktober</option><option>November</option><option>Desember</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Pilih File PDF</label>
            <input type="file" id="filePDF" class="form-control" accept="application/pdf" required>
        </div>
        <button type="submit" id="tombolKirim" class="btn btn-primary">KIRIM LAPORAN SEKARANG</button>
    </form>
    <div id="pesan" class="mt-3 text-center" style="display:none;"></div>
</div>

<script>
    const URL_GOOGLE = 'https://script.google.com/macros/s/AKfycbwYPEyIsEZFgm99Y7IXmPl38UTzMDRUahflSwOxK7dLNzAN3veUXKY52Nr0tfuNif6k/exec';
    const form = document.getElementById('formLaporan');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const pesan = document.getElementById('pesan');
        const tombol = document.getElementById('tombolKirim');
        
        pesan.style.display = 'block';
        pesan.innerHTML = "⏳ Sedang mengirim... mohon tunggu.";
        tombol.disabled = true;

        const file = document.getElementById('filePDF').files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const base64 = e.target.result.split(',')[1];
            const data = new URLSearchParams();
            data.append('nama', form.nama.value);
            data.append('bulan', form.bulan.value);
            data.append('fileBase64', base64);
            data.append('fileName', file.name);

            fetch(URL_GOOGLE, { method: 'POST', body: data })
            .then(() => {
                pesan.innerHTML = "<b class='text-success'>✅ Laporan Berhasil Terkirim!</b>";
                form.reset();
                tombol.disabled = false;
            })
            .catch(() => {
                pesan.innerHTML = "<b class='text-danger'>❌ Gagal! Periksa koneksi internet.</b>";
                tombol.disabled = false;
            });
        };
        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
